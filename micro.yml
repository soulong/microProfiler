name: micro
channels:
  - conda-forge
  - bioconda
dependencies:
  - python>=3.10
  - numpy
  - pandas
  - scipy
  - scikit-image
  - tifffile
  - cellpose
  - torch
  - jax
  - pyyaml
  - tqdm
  - pyside6
  - pytest
  - pytest-cov
  - pip
  - pip:
    - natsort
    - pydantic>=2.0
    - pillow
    - ruff
